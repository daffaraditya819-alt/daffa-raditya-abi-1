<!DOCTYPE html>
<html>
<head>
    <title>Kamen Rider Gallery + Image</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            text-align: center;
        }

        header {
            background: linear-gradient(to right, red, black);
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .card:hover {
            transform: scale(1.08);
        }

        /* warna */
        .kuuga { background: crimson; }
        .kabuto { background: black; border: 2px solid red; }
        .build { background: linear-gradient(to right, blue, red); }
        .geats { background: white; color: black; }

        /* modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
        }

        .modal-content {
            background: #111;
            margin: 8% auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
        }

        .modal img {
            width: 200px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .close {
            float: right;
            cursor: pointer;
            color: red;
            font-size: 20px;
        }
    </style>
</head>
<body>

<header>Kamen Rider Image ⚡</header>

<div class="grid">
    <div class="card kuuga" onclick="showStory('kuuga')">Kuuga</div>
    <div class="card kabuto" onclick="showStory('kabuto')">Kabuto</div>
    <div class="card build" onclick="showStory('build')">Build</div>
    <div class="card geats" onclick="showStory('geats')">Geats</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">X</span>
        <h2 id="title"></h2>
        <img id="image" src="">
        <p id="story"></p>
    </div>
</div>

<script>
function showStory(rider) {
    const title = document.getElementById("title");
    const story = document.getElementById("story");
    const image = document.getElementById("image");

    const data = {
        kuuga: {
            title: "Kuuga",
            story: "Yusuke Godai menjadi Kuuga untuk melawan Grongi.",
            img: "https://upload.wikimedia.org/wikipedia/en/7/7e/Kamen_Rider_Kuuga.png"
        },
        kabuto: {
            title: "Kabuto",
            story: "Tendou Souji menggunakan Clock Up untuk melawan Worm.",
            img: "https://upload.wikimedia.org/wikipedia/en/2/2f/Kamen_Rider_Kabuto.png"
        },
        build: {
            title: "Build",
            story: "Sento Kiryu adalah ilmuwan jenius yang melawan Smash.",
            img: "https://upload.wikimedia.org/wikipedia/en/0/0c/Kamen_Rider_Build.png"
        },
        geats: {
            title: "Geats",
            story: "Ace Ukiyo bertarung dalam Desire Grand Prix.",
            img: "https://upload.wikimedia.org/wikipedia/en/8/8b/Kamen_Rider_Geats.png"
        }
    };

    title.innerText = data[rider].title;
    story.innerText = data[rider].story;
    image.src = data[rider].img;

    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
